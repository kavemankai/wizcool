# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: damage_cascade
    status: active
    source: design/gdd/combat.md
    referenced_by: [design/gdd/gear-economy.md, design/gdd/combat-cutaway.md]
    variables: [toughness, dmg, gear_slots]
    expression: "toughness -= dmg; if toughness<=0 fracture intact gear (armor first, weapon second); if no intact gear break fractured gear; if nothing break -> DOWNED"
    output_range: [NORMAL, GEAR_FRACTURED, GEAR_BROKEN, DOWNED]
    added: "2026-06-07"

  - name: chebyshev_distance
    status: active
    source: design/gdd/combat.md
    referenced_by: [design/gdd/ai.md, design/gdd/combat-cutaway.md]
    variables: [ax, ay, tx, ty]
    expression: "max(abs(ax - tx), abs(ay - ty))"
    notes: "Used for both attack range check and melee/ranged detection in cutaway."
    added: "2026-06-07"

  - name: effective_modifier
    status: active
    source: design/gdd/gear-economy.md
    referenced_by: [design/gdd/combat.md]
    variables: [modifier, state, patched_this_mission]
    expression: "INTACT: modifier | FRACTURED+patched: modifier/2 | FRACTURED: 0 | BROKEN: 0"
    added: "2026-06-07"

